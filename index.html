<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blindtest — guess the song</title>
<style>
  :root{
    --ink:#1a1a2e;
    --paper:#faf6ef;
    --accent:#ff5a5f;
    --accent2:#ffd23f;
    --accent3:#3ec1a3;
    --card:#ffffff;
    --muted:#6b6b7b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue',Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
  }
  .stage{
    width:100%;
    max-width:520px;
  }
  .brand{
    text-align:center;
    margin-bottom:1.5rem;
  }
  .brand h1{
    font-size:2.4rem;
    margin:0;
    letter-spacing:-1px;
    font-weight:800;
  }
  .brand h1 span{color:var(--accent);}
  .brand p{color:var(--muted);margin:.4rem 0 0;font-size:.95rem;}

  .card{
    background:var(--card);
    border-radius:20px;
    padding:1.75rem;
    box-shadow:0 10px 30px rgba(26,26,46,0.08);
    border:3px solid var(--ink);
  }

  label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;}
  input[type=text]{
    width:100%;
    padding:.8rem 1rem;
    border:2px solid var(--ink);
    border-radius:12px;
    font-size:1rem;
    margin:.5rem 0 1rem;
    font-family:inherit;
  }
  input[type=text]:focus{outline:3px solid var(--accent2);}

  button{
    font-family:inherit;
    font-weight:800;
    font-size:1rem;
    border-radius:12px;
    border:3px solid var(--ink);
    padding:.85rem 1rem;
    cursor:pointer;
    width:100%;
    background:var(--ink);
    color:var(--paper);
    transition:transform .1s ease;
  }
  button:active{transform:scale(0.97);}
  button.secondary{background:var(--card);color:var(--ink);}
  button.accent{background:var(--accent);color:#fff;}

  .row{display:flex;gap:.6rem;}
  .row button{width:auto;flex:1;}

  #game{display:none;}

  .disc-wrap{display:flex;justify-content:center;margin:.5rem 0 1.25rem;}
  .disc{
    width:110px;height:110px;border-radius:50%;
    background:repeating-radial-gradient(circle, var(--ink) 0 2px, #333 2px 6px);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .disc::after{
    content:"";
    width:22px;height:22px;border-radius:50%;
    background:var(--accent2);
    border:3px solid var(--ink);
  }
  .disc.spin{animation:spin 1.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .meta{
    text-align:center;
    font-size:.85rem;
    color:var(--muted);
    margin-bottom:1rem;
    font-weight:600;
  }
  .pill{
    display:inline-block;
    background:var(--accent3);
    color:#04342c;
    padding:.15rem .6rem;
    border-radius:999px;
    font-weight:700;
    font-size:.75rem;
  }

  #result{
    text-align:center;
    font-weight:700;
    min-height:1.4em;
    margin-top:.75rem;
  }
  .result-ok{color:#0f6e56;}
  .result-hint{color:var(--muted);}

  .score{
    text-align:center;
    font-size:.85rem;
    color:var(--muted);
    margin-top:1rem;
  }

  .footnote{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    margin-top:1.25rem;
  }
</style>
</head>

<body>
<div class="stage">
  <div class="brand">
    <h1>Blind<span>test</span></h1>
    <p>the party game where a 1-second clip is all you get</p>
  </div>

  <div class="card" id="setup">
    <div id="loginRow" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:2px dashed var(--border,#ddd);">
      <span id="loginStatus" style="font-size:.85rem;color:var(--muted);">host not connected</span>
      <button class="secondary" id="loginBtn" style="width:auto;padding:.5rem .9rem;font-size:.85rem;">connect spotify</button>
    </div>
    <label for="link">spotify playlist link</label>
    <input id="link" type="text" placeholder="https://open.spotify.com/playlist/...">
    <label for="players">players (comma separated, optional)</label>
    <input id="players" type="text" placeholder="Sam, Jess, Priya">
    <button class="accent" id="startBtn">start the game</button>
  </div>

  <div class="card" id="game">
    <div class="meta">round <span id="round">1</span> of <span id="totalRounds">5</span> &nbsp;·&nbsp; <span class="pill" id="turnLabel">Sam's turn</span></div>
    <div class="disc-wrap"><div class="disc" id="disc"></div></div>
    <div class="row" style="margin-bottom:1rem;">
      <button id="playBtn">▶ play clip</button>
    </div>
    <div class="meta" id="hint">1 second clip · <span id="tries">3</span> extra listens left</div>
    <input id="guess" type="text" placeholder="song title or artist">
    <div class="row">
      <button class="secondary" id="skipBtn">skip</button>
      <button class="accent" id="guessBtn">lock in guess</button>
    </div>
    <div id="result"></div>
    <div class="score" id="scoreboard"></div>
  </div>

  <p class="footnote" id="footnote">running in demo mode — clips are placeholder tones until this is connected to Spotify</p>
</div>

<script>
const $ = id => document.getElementById(id);
const setup=$('setup'), game=$('game');
const linkInput=$('link'), playersInput=$('players');
const startBtn=$('startBtn'), playBtn=$('playBtn'), guessBtn=$('guessBtn'), skipBtn=$('skipBtn');
const disc=$('disc'), hint=$('hint'), tries=$('tries'), result=$('result'), guess=$('guess');
const roundEl=$('round'), totalRoundsEl=$('totalRounds'), turnLabel=$('turnLabel'), scoreboard=$('scoreboard');
const loginBtn=$('loginBtn'), loginStatus=$('loginStatus');

const TOTAL_ROUNDS = 5;
const CLIENT_ID = '748e3e8594814b78a534f113a72a338d';
const REDIRECT_URI = 'https://music-fun-thing.vercel.app/api/done';
const SCOPES = 'playlist-read-private playlist-read-collaborative user-library-read';

function base64url(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function pkceChallenge(verifier){
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return base64url(digest);
}
function randomString(len){
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return base64url(arr).slice(0,len);
}

async function startLogin(){
  const verifier = randomString(64);
  sessionStorage.setItem('pkce_verifier', verifier);
  const challenge = await pkceChallenge(verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: 'S256',
    code_challenge: challenge
  });
  window.location = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeToken(code){
  const verifier = sessionStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body
  });
  if(!res.ok) throw new Error('token exchange failed');
  return res.json();
}

let accessToken = sessionStorage.getItem('spotify_token') || null;
let playlistTracks = [];

if(accessToken){
  loginStatus.textContent = 'host connected';
  loginBtn.textContent = 'reconnect';
}

loginBtn.onclick = startLogin;

(async function handleRedirect(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(code){
    window.history.replaceState({}, document.title, window.location.pathname === '/api/done' ? '/' : window.location.pathname);
    try{
      const tokenData = await exchangeToken(code);
      accessToken = tokenData.access_token;
      sessionStorage.setItem('spotify_token', accessToken);
      loginStatus.textContent = 'host connected';
      loginBtn.textContent = 'reconnect';
    }catch(e){
      loginStatus.textContent = 'login failed — try again';
    }
  }
})();

function extractPlaylistId(url){
  const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

async function fetchPlaylistTracks(playlistId){
  const headers = {Authorization: 'Bearer '+accessToken};
  let items = [];
  let url = 'https://api.spotify.com/v1/playlists/'+playlistId+'/items?limit=50&fields=items(track(id,uri,name,artists(name),preview_url,duration_ms)),next';
  while(url && items.length < 100){
    const res = await fetch(url, {headers});
    if(!res.ok) throw new Error('could not load playlist — is it public, or does the host have access?');
    const data = await res.json();
    items = items.concat(data.items.filter(i => i.track));
    url = data.next;
  }
  return items.map(i => ({
    name: i.track.name,
    artist: i.track.artists.map(a=>a.name).join(', '),
    preview: i.track.preview_url,
    uri: i.track.uri,
    duration: i.track.duration_ms
  }));
}
let players = ['You'];
let scores = {};
let round = 1;
let playerIdx = 0;
let triesLeft = 3;
let clipSeconds = 1;
let currentTrack = null;
let usedIndexes = new Set();
let audioEl = new Audio();

function pickTrack(){
  if(playlistTracks.length === 0) return null;
  if(usedIndexes.size >= playlistTracks.length) usedIndexes.clear();
  let idx;
  do{ idx = Math.floor(Math.random()*playlistTracks.length); } while(usedIndexes.has(idx));
  usedIndexes.add(idx);
  return playlistTracks[idx];
}

function playClip(seconds){
  if(currentTrack && currentTrack.preview){
    audioEl.src = currentTrack.preview;
    audioEl.currentTime = Math.floor(Math.random()*20);
    audioEl.play();
    disc.classList.add('spin');
    setTimeout(()=>{ audioEl.pause(); disc.classList.remove('spin'); }, seconds*1000);
  } else {
    beep(seconds);
  }
}

function beep(seconds){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 220 + Math.random()*320;
  osc.connect(gain); gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime+0.03);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+seconds);
  osc.start();
  osc.stop(ctx.currentTime+seconds+0.05);
  disc.classList.add('spin');
  setTimeout(()=>disc.classList.remove('spin'), seconds*1000+100);
}

function renderScoreboard(){
  scoreboard.textContent = players.map(p => p+': '+(scores[p]||0)).join('  ·  ');
}

function newRound(){
  triesLeft = 3;
  clipSeconds = 1;
  guess.value = '';
  result.textContent = '';
  tries.textContent = triesLeft;
  hint.innerHTML = '1 second clip · <span id="tries">'+triesLeft+'</span> extra listens left';
  roundEl.textContent = round;
  turnLabel.textContent = players[playerIdx] + "'s turn";
  currentTrack = pickTrack();
}

startBtn.onclick = async () => {
  if(!linkInput.value.trim()){
    linkInput.style.borderColor = '#e24b4a';
    return;
  }
  if(!accessToken){
    result.textContent = '';
    loginStatus.textContent = 'connect spotify first';
    return;
  }
  const playlistId = extractPlaylistId(linkInput.value.trim());
  if(!playlistId){
    linkInput.style.borderColor = '#e24b4a';
    return;
  }
  startBtn.disabled = true;
  startBtn.textContent = 'loading playlist…';
  try{
    playlistTracks = await fetchPlaylistTracks(playlistId);
  }catch(e){
    startBtn.disabled = false;
    startBtn.textContent = 'start the game';
    loginStatus.textContent = e.message;
    return;
  }
  startBtn.disabled = false;
  startBtn.textContent = 'start the game';
  if(playlistTracks.length === 0){
    loginStatus.textContent = 'no tracks found in that playlist';
    return;
  }
  const raw = playersInput.value.trim();
  players = raw ? raw.split(',').map(s=>s.trim()).filter(Boolean) : ['You'];
  players.forEach(p => scores[p]=0);
  round = 1; playerIdx = 0;
  totalRoundsEl.textContent = TOTAL_ROUNDS;
  setup.style.display = 'none';
  game.style.display = 'block';
  renderScoreboard();
  newRound();
};

playBtn.onclick = () => playClip(clipSeconds);

function advance(){
  playerIdx = (playerIdx+1) % players.length;
  if(playerIdx === 0) round++;
  if(round > TOTAL_ROUNDS){
    result.innerHTML = '<span class="result-ok">game over! final scores above</span>';
    playBtn.disabled = true; guessBtn.disabled = true; skipBtn.disabled = true;
    return;
  }
  newRound();
}

function checkGuess(text){
  if(!currentTrack) return false;
  const g = text.toLowerCase();
  return g.includes(currentTrack.name.toLowerCase()) ||
         currentTrack.name.toLowerCase().includes(g) ||
         g.includes(currentTrack.artist.toLowerCase());
}

guessBtn.onclick = () => {
  if(!guess.value.trim()) return;
  const correct = checkGuess(guess.value.trim());
  if(correct){
    const bonus = triesLeft + 1;
    scores[players[playerIdx]] = (scores[players[playerIdx]]||0) + bonus;
    result.innerHTML = '<span class="result-ok">nice! it was '+currentTrack.name+' — '+currentTrack.artist+' (+'+bonus+' points)</span>';
    renderScoreboard();
    setTimeout(advance, 1600);
    return;
  }
  if(triesLeft > 0){
    triesLeft--; clipSeconds++;
    tries.textContent = triesLeft;
    hint.innerHTML = clipSeconds+' second clip · <span id="tries">'+triesLeft+'</span> extra listens left';
    result.innerHTML = '<span class="result-hint">not it — try again</span>';
  } else {
    result.innerHTML = '<span class="result-hint">out of listens — it was '+currentTrack.name+' — '+currentTrack.artist+'</span>';
    setTimeout(advance, 1800);
  }
};

skipBtn.onclick = () => {
  result.innerHTML = '<span class="result-hint">skipped — it was '+(currentTrack?currentTrack.name:'?')+'</span>';
  setTimeout(advance, 1000);
};
</script>
</body>
</html>
