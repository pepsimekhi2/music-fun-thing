<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blindtest — guess the song</title>
<style>
  :root{
    --ink:#1a1a2e;
    --paper:#faf6ef;
    --accent:#ff5a5f;
    --accent2:#ffd23f;
    --accent3:#3ec1a3;
    --card:#ffffff;
    --muted:#6b6b7b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue',Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
  }
  .stage{
    width:100%;
    max-width:520px;
  }
  .brand{
    text-align:center;
    margin-bottom:1.5rem;
  }
  .brand h1{
    font-size:2.4rem;
    margin:0;
    letter-spacing:-1px;
    font-weight:800;
  }
  .brand h1 span{color:var(--accent);}
  .brand p{color:var(--muted);margin:.4rem 0 0;font-size:.95rem;}

  .card{
    background:var(--card);
    border-radius:20px;
    padding:1.75rem;
    box-shadow:0 10px 30px rgba(26,26,46,0.08);
    border:3px solid var(--ink);
  }

  label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;}
  input[type=text]{
    width:100%;
    padding:.8rem 1rem;
    border:2px solid var(--ink);
    border-radius:12px;
    font-size:1rem;
    margin:.5rem 0 1rem;
    font-family:inherit;
  }
  input[type=text]:focus{outline:3px solid var(--accent2);}

  button{
    font-family:inherit;
    font-weight:800;
    font-size:1rem;
    border-radius:12px;
    border:3px solid var(--ink);
    padding:.85rem 1rem;
    cursor:pointer;
    width:100%;
    background:var(--ink);
    color:var(--paper);
    transition:transform .1s ease;
  }
  button:active{transform:scale(0.97);}
  button.secondary{background:var(--card);color:var(--ink);}
  button.accent{background:var(--accent);color:#fff;}
  button:disabled{opacity:0.5;cursor:not-allowed;}

  .row{display:flex;gap:.6rem;}
  .row button{width:auto;flex:1;}

  #game{display:none;}

  .disc-wrap{display:flex;justify-content:center;margin:.5rem 0 1.25rem;}
  .disc{
    width:110px;height:110px;border-radius:50%;
    background:repeating-radial-gradient(circle, var(--ink) 0 2px, #333 2px 6px);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .disc::after{
    content:"";
    width:22px;height:22px;border-radius:50%;
    background:var(--accent2);
    border:3px solid var(--ink);
  }
  .disc.spin{animation:spin 1.6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .meta{
    text-align:center;
    font-size:.85rem;
    color:var(--muted);
    margin-bottom:1rem;
    font-weight:600;
  }
  .pill{
    display:inline-block;
    background:var(--accent3);
    color:#04342c;
    padding:.15rem .6rem;
    border-radius:999px;
    font-weight:700;
    font-size:.75rem;
  }

  #result{
    text-align:center;
    font-weight:700;
    min-height:1.4em;
    margin-top:.75rem;
  }
  .result-ok{color:#0f6e56;}
  .result-hint{color:var(--muted);}

  .score{
    text-align:center;
    font-size:.85rem;
    color:var(--muted);
    margin-top:1rem;
  }

  .footnote{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    margin-top:1.25rem;
  }
  
  #loginStatus {
    font-size:.85rem;
    color:var(--muted);
  }
  
  .status-connected {
    color: #0f6e56;
  }
  .status-disconnected {
    color: #e24b4a;
  }
  
  .error-box {
    background: #f8d7da;
    border: 2px solid #dc3545;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    color: #721c24;
    font-size: 0.9rem;
    display: none;
  }
  
  .success-box {
    background: #d4edda;
    border: 2px solid #28a745;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    color: #155724;
    font-size: 0.9rem;
    display: none;
  }
  
  .scope-check {
    background: #e7f3ff;
    border: 2px solid #2196F3;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .scope-check .valid { color: #0f6e56; }
  .scope-check .invalid { color: #dc3545; }
</style>
</head>
<body>
<div class="stage">
  <div class="brand">
    <h1>Blind<span>test</span></h1>
    <p>the party game where a 1-second clip is all you get</p>
  </div>

  <div class="card" id="setup">
    <div id="scopeCheck" class="scope-check">
      <strong>🔑 Required Permissions:</strong><br>
      <span id="scopeStatus">Loading...</span>
    </div>
    
    <div id="errorBox" class="error-box"></div>
    <div id="successBox" class="success-box"></div>
    
    <div id="loginRow" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:2px dashed #ddd;">
      <span id="loginStatus" class="status-disconnected">⚠️ host not connected</span>
      <button class="secondary" id="loginBtn" style="width:auto;padding:.5rem .9rem;font-size:.85rem;">🔗 connect spotify</button>
    </div>
    <label for="link">spotify playlist link</label>
    <input id="link" type="text" placeholder="https://open.spotify.com/playlist/...">
    <label for="players">players (comma separated, optional)</label>
    <input id="players" type="text" placeholder="Sam, Jess, Priya">
    <button class="accent" id="startBtn">🚀 start the game</button>
  </div>

  <div class="card" id="game">
    <div class="meta">round <span id="round">1</span> of <span id="totalRounds">5</span> &nbsp;·&nbsp; <span class="pill" id="turnLabel">Sam's turn</span></div>
    <div class="disc-wrap"><div class="disc" id="disc"></div></div>
    <div class="row" style="margin-bottom:1rem;">
      <button id="playBtn">▶ play clip</button>
    </div>
    <div class="meta" id="hint">1 second clip · <span id="tries">3</span> extra listens left</div>
    <input id="guess" type="text" placeholder="song title or artist">
    <div class="row">
      <button class="secondary" id="skipBtn">skip</button>
      <button class="accent" id="guessBtn">lock in guess</button>
    </div>
    <div id="result"></div>
    <div class="score" id="scoreboard"></div>
  </div>

  <p class="footnote" id="footnote">🎵 connected to Spotify — premium users get full song clips</p>
</div>

<script>
// ============ CONFIGURATION ============
const CLIENT_ID = '748e3e8594814b78a534f113a72a338d';
const REDIRECT_URI = window.location.origin + window.location.pathname;

// CRITICAL: These scopes must be requested
const SCOPES = [
  'playlist-read-private',
  'playlist-read-collaborative',
  'user-read-private',
  'user-read-email',
  'streaming',
  'user-modify-playback-state',
  'user-read-playback-state',
  'user-library-read'
];

// ============ DOM ELEMENTS ============
const $ = id => document.getElementById(id);
const setup=$('setup'), game=$('game');
const linkInput=$('link'), playersInput=$('players');
const startBtn=$('startBtn'), playBtn=$('playBtn'), guessBtn=$('guessBtn'), skipBtn=$('skipBtn');
const disc=$('disc'), hint=$('hint'), tries=$('tries'), result=$('result'), guess=$('guess');
const roundEl=$('round'), totalRoundsEl=$('totalRounds'), turnLabel=$('turnLabel'), scoreboard=$('scoreboard');
const loginBtn=$('loginBtn'), loginStatus=$('loginStatus');
const errorBox=$('errorBox'), successBox=$('successBox');
const scopeStatus=$('scopeStatus');

// ============ STATE ============
let accessToken = null;
let refreshToken = null;
let playlistTracks = [];
let sdkPlayer = null;
let sdkDeviceId = null;
let sdkReady = false;
let players = ['You'];
let scores = {};
let round = 1;
let playerIdx = 0;
let triesLeft = 3;
let clipSeconds = 1;
let currentTrack = null;
let usedIndexes = new Set();
let audioEl = new Audio();
let gameOver = false;

// ============ UTILITY FUNCTIONS ============
function showError(message) {
  errorBox.style.display = 'block';
  errorBox.textContent = '❌ ' + message;
  setTimeout(() => {
    errorBox.style.display = 'none';
  }, 8000);
}

function showSuccess(message) {
  successBox.style.display = 'block';
  successBox.textContent = '✅ ' + message;
  setTimeout(() => {
    successBox.style.display = 'none';
  }, 5000);
}

// ============ PKCE FUNCTIONS ============
function base64url(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

function randomString(length) {
  const array = new Uint8Array(length);
  window.crypto.getRandomValues(array);
  return base64url(array);
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  const hash = await window.crypto.subtle.digest('SHA-256', data);
  return hash;
}

async function generateCodeChallenge(codeVerifier) {
  const hash = await sha256(codeVerifier);
  return base64url(hash);
}

// ============ SCOPE CHECK ============
async function checkTokenScopes() {
  if (!accessToken) {
    scopeStatus.innerHTML = '❌ <span class="invalid">Not connected</span>';
    return;
  }
  
  try {
    const response = await fetch('https://api.spotify.com/v1/me', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    
    if (response.ok) {
      const scopes = response.headers.get('X-OAuth-Scopes') || '';
      const hasScopes = SCOPES.every(s => scopes.includes(s));
      
      if (hasScopes) {
        scopeStatus.innerHTML = `✅ <span class="valid">All permissions granted!</span>`;
      } else {
        const missing = SCOPES.filter(s => !scopes.includes(s));
        scopeStatus.innerHTML = `
          ⚠️ Missing scopes: <span class="invalid">${missing.join(', ')}</span><br>
          <small>Click "Reconnect" to grant all permissions</small>
        `;
      }
    }
  } catch (error) {
    console.error('Scope check failed:', error);
  }
}

// ============ SPOTIFY AUTH ============
function updateLoginStatus(connected) {
  if (connected) {
    loginStatus.textContent = '✅ connected to Spotify';
    loginStatus.className = 'status-connected';
    loginBtn.textContent = '🔄 reconnect';
    checkTokenScopes();
    showSuccess('Connected to Spotify!');
  } else {
    loginStatus.textContent = '⚠️ host not connected';
    loginStatus.className = 'status-disconnected';
    loginBtn.textContent = '🔗 connect spotify';
    scopeStatus.innerHTML = '❌ <span class="invalid">Not connected</span>';
  }
}

async function startLogin() {
  const codeVerifier = randomString(64);
  const codeChallenge = await generateCodeChallenge(codeVerifier);
  
  sessionStorage.setItem('code_verifier', codeVerifier);
  
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES.join(' '),
    code_challenge_method: 'S256',
    code_challenge: codeChallenge,
    show_dialog: true
  });
  
  window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeCodeForToken(code) {
  const codeVerifier = sessionStorage.getItem('code_verifier');
  
  if (!codeVerifier) {
    throw new Error('No code verifier found');
  }
  
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code: code,
    redirect_uri: REDIRECT_URI,
    code_verifier: codeVerifier
  });
  
  try {
    const response = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: params.toString()
    });
    
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error_description || 'Failed to exchange code');
    }
    
    const data = await response.json();
    return {
      accessToken: data.access_token,
      refreshToken: data.refresh_token,
      expiresIn: data.expires_in
    };
  } catch (error) {
    console.error('Token exchange error:', error);
    throw error;
  }
}

async function refreshAccessToken() {
  if (!refreshToken) return null;
  
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'refresh_token',
    refresh_token: refreshToken
  });
  
  try {
    const response = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: params.toString()
    });
    
    if (!response.ok) throw new Error('Failed to refresh token');
    
    const data = await response.json();
    accessToken = data.access_token;
    sessionStorage.setItem('spotify_token', accessToken);
    return accessToken;
  } catch (error) {
    console.error('Token refresh error:', error);
    return null;
  }
}

// Handle the redirect from Spotify
(async function handleAuthRedirect() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  
  if (error) {
    console.error('Auth error:', error);
    updateLoginStatus(false);
    showError('Auth error: ' + error);
    return;
  }
  
  if (code) {
    try {
      const tokenData = await exchangeCodeForToken(code);
      accessToken = tokenData.accessToken;
      refreshToken = tokenData.refreshToken;
      
      sessionStorage.setItem('spotify_token', accessToken);
      if (refreshToken) {
        sessionStorage.setItem('spotify_refresh_token', refreshToken);
      }
      
      updateLoginStatus(true);
      initSdkPlayer();
      
      const cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, cleanUrl);
    } catch (error) {
      console.error('Token exchange failed:', error);
      updateLoginStatus(false);
      showError('Login failed: ' + error.message);
    }
  } else {
    const savedToken = sessionStorage.getItem('spotify_token');
    const savedRefresh = sessionStorage.getItem('spotify_refresh_token');
    
    if (savedToken) {
      accessToken = savedToken;
      refreshToken = savedRefresh;
      updateLoginStatus(true);
      initSdkPlayer();
    } else {
      updateLoginStatus(false);
    }
  }
})();

loginBtn.onclick = startLogin;

// ============ SPOTIFY SDK ============
window.__sdkReadyQueue = [];
window.onSpotifyWebPlaybackSDKReady = function() {
  window.__spotifySDKLoaded = true;
  window.__sdkReadyQueue.forEach(fn => fn());
  window.__sdkReadyQueue = [];
};

function initSdkPlayer() {
  if (!accessToken || sdkPlayer) return;
  
  if (!window.__spotifySDKLoaded) {
    window.__sdkReadyQueue.push(initSdkPlayer);
    return;
  }
  
  try {
    sdkPlayer = new Spotify.Player({
      name: 'Blindtest party game',
      getOAuthToken: cb => cb(accessToken),
      volume: 0.8
    });
    
    sdkPlayer.addListener('ready', ({device_id}) => {
      sdkDeviceId = device_id;
      sdkReady = true;
      console.log('✅ Spotify player ready with device ID:', device_id);
      loginStatus.textContent = '✅ connected & player ready';
    });
    
    sdkPlayer.addListener('not_ready', () => {
      sdkReady = false;
      console.log('⚠️ Spotify player not ready');
    });
    
    sdkPlayer.addListener('initialization_error', (e) => {
      console.error('Spotify init error:', e);
    });
    
    sdkPlayer.addListener('authentication_error', (e) => {
      console.error('Spotify auth error:', e);
      refreshAccessToken();
    });
    
    sdkPlayer.connect();
  } catch (error) {
    console.error('Failed to initialize Spotify player:', error);
  }
}

// Load the Spotify SDK
const sdkScript = document.createElement('script');
sdkScript.src = 'https://sdk.scdn.co/spotify-player.js';
sdkScript.async = true;
document.head.appendChild(sdkScript);

// ============ API HELPERS ============
async function spotifyFetch(url, options = {}) {
  const headers = {
    'Authorization': 'Bearer ' + accessToken,
    'Content-Type': 'application/json',
    ...options.headers
  };
  
  let response = await fetch(url, { ...options, headers });
  
  if (response.status === 401) {
    const newToken = await refreshAccessToken();
    if (newToken) {
      headers['Authorization'] = 'Bearer ' + newToken;
      response = await fetch(url, { ...options, headers });
    } else {
      sessionStorage.removeItem('spotify_token');
      sessionStorage.removeItem('spotify_refresh_token');
      accessToken = null;
      refreshToken = null;
      updateLoginStatus(false);
      throw new Error('Session expired. Please reconnect Spotify.');
    }
  }
  
  if (!response.ok) {
    let errorMessage;
    try {
      const error = await response.json();
      errorMessage = error.error?.message || error.error_description || `HTTP ${response.status}`;
    } catch {
      errorMessage = `HTTP ${response.status}`;
    }
    throw new Error(errorMessage);
  }
  
  return response;
}

// ============ PLAYLIST FUNCTIONS ============
function extractPlaylistId(url) {
  const match = url.match(/playlist\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

async function fetchPlaylistTracks(playlistId) {
  let items = [];
  
  try {
    // First, verify the playlist is accessible
    const playlistInfo = await spotifyFetch(`https://api.spotify.com/v1/playlists/${playlistId}`);
    const playlistData = await playlistInfo.json();
    console.log('📋 Playlist info:', playlistData);
    
    // Check if we can access tracks
    if (playlistData.tracks) {
      const tracksResponse = await spotifyFetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=50`);
      const tracksData = await tracksResponse.json();
      
      items = tracksData.items
        .filter(item => item.track && item.track.id)
        .map(item => ({
          id: item.track.id,
          name: item.track.name,
          artist: item.track.artists.map(a => a.name).join(', '),
          preview: item.track.preview_url,
          uri: item.track.uri,
          duration: item.track.duration_ms
        }));
      
      // Handle pagination
      let nextUrl = tracksData.next;
      while (nextUrl && items.length < 100) {
        const nextResponse = await spotifyFetch(nextUrl);
        const nextData = await nextResponse.json();
        const moreTracks = nextData.items
          .filter(item => item.track && item.track.id)
          .map(item => ({
            id: item.track.id,
            name: item.track.name,
            artist: item.track.artists.map(a => a.name).join(', '),
            preview: item.track.preview_url,
            uri: item.track.uri,
            duration: item.track.duration_ms
          }));
        items = items.concat(moreTracks);
        nextUrl = nextData.next;
      }
    } else {
      throw new Error('Cannot access tracks in this playlist');
    }
  } catch (error) {
    console.error('Error fetching playlist:', error);
    throw new Error(`Cannot access playlist: ${error.message}`);
  }
  
  if (items.length === 0) {
    throw new Error('No tracks found in this playlist');
  }
  
  return items;
}

// ============ GAME LOGIC ============
function pickTrack() {
  if (playlistTracks.length === 0) return null;
  if (usedIndexes.size >= playlistTracks.length) usedIndexes.clear();
  
  let idx;
  let attempts = 0;
  do {
    idx = Math.floor(Math.random() * playlistTracks.length);
    attempts++;
  } while (usedIndexes.has(idx) && attempts < 50);
  
  usedIndexes.add(idx);
  return playlistTracks[idx];
}

async function playViaSDK(seconds) {
  if (!sdkReady || !sdkDeviceId || !currentTrack) {
    if (currentTrack?.preview) {
      playPreview(seconds);
      return;
    }
    beep(seconds);
    return;
  }
  
  const maxStart = Math.max(0, (currentTrack.duration || 180000) - (seconds * 1000) - 1000);
  const startMs = Math.floor(Math.random() * Math.min(maxStart, currentTrack.duration * 0.8));
  
  try {
    await spotifyFetch(`https://api.spotify.com/v1/me/player/play?device_id=${sdkDeviceId}`, {
      method: 'PUT',
      body: JSON.stringify({
        uris: [currentTrack.uri],
        position_ms: startMs
      })
    });
    
    disc.classList.add('spin');
    setTimeout(async () => {
      try {
        await spotifyFetch(`https://api.spotify.com/v1/me/player/pause?device_id=${sdkDeviceId}`, {
          method: 'PUT'
        });
      } catch (e) {
        console.warn('Could not pause player:', e);
      }
      disc.classList.remove('spin');
    }, seconds * 1000 + 100);
  } catch (error) {
    console.warn('Spotify playback failed, falling back:', error);
    if (currentTrack.preview) {
      playPreview(seconds);
    } else {
      beep(seconds);
    }
  }
}

function playPreview(seconds) {
  audioEl.src = currentTrack.preview;
  audioEl.currentTime = Math.floor(Math.random() * Math.max(0, audioEl.duration - seconds));
  audioEl.play().catch(() => beep(seconds));
  disc.classList.add('spin');
  setTimeout(() => {
    audioEl.pause();
    disc.classList.remove('spin');
  }, seconds * 1000 + 100);
}

function beep(seconds) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 220 + Math.random() * 320;
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + seconds);
    osc.start();
    osc.stop(ctx.currentTime + seconds + 0.05);
    disc.classList.add('spin');
    setTimeout(() => disc.classList.remove('spin'), seconds * 1000 + 100);
  } catch (e) {
    console.warn('Beep failed:', e);
  }
}

function playClip(seconds) {
  if (!currentTrack || gameOver) return;
  
  if (currentTrack.uri && sdkReady && sdkDeviceId) {
    playViaSDK(seconds);
  } else if (currentTrack.preview) {
    playPreview(seconds);
  } else {
    beep(seconds);
  }
}

function renderScoreboard() {
  scoreboard.textContent = players.map(p => `${p}: ${scores[p] || 0}`).join('  ·  ');
}

function advance() {
  if (gameOver) return;
  
  playerIdx = (playerIdx + 1) % players.length;
  if (playerIdx === 0) round++;
  
  if (round > TOTAL_ROUNDS) {
    gameOver = true;
    result.innerHTML = '<span class="result-ok">🏆 Game Over! Final scores above</span>';
    playBtn.disabled = true;
    guessBtn.disabled = true;
    skipBtn.disabled = true;
    return;
  }
  
  newRound();
}

function newRound() {
  triesLeft = 3;
  clipSeconds = 1;
  guess.value = '';
  result.textContent = '';
  tries.textContent = triesLeft;
  hint.innerHTML = `1 second clip · <span id="tries">${triesLeft}</span> extra listens left`;
  roundEl.textContent = round;
  turnLabel.textContent = players[playerIdx] + "'s turn";
  currentTrack = pickTrack();
  
  if (!currentTrack) {
    result.innerHTML = '<span class="result-hint">No more tracks in playlist!</span>';
    gameOver = true;
  }
}

function checkGuess(text) {
  if (!currentTrack) return false;
  const g = text.toLowerCase().trim();
  const name = currentTrack.name.toLowerCase();
  const artist = currentTrack.artist.toLowerCase();
  
  return g.includes(name) || name.includes(g) || 
         g.includes(artist) || artist.includes(g) ||
         (g.split(' ').some(word => name.includes(word) && artist.includes(word)));
}

// ============ GAME START ============
const TOTAL_ROUNDS = 5;

startBtn.onclick = async () => {
  const linkValue = linkInput.value.trim();
  if (!linkValue) {
    linkInput.style.borderColor = '#e24b4a';
    setTimeout(() => linkInput.style.borderColor = '', 2000);
    showError('Please enter a Spotify playlist URL');
    return;
  }
  
  if (!accessToken) {
    updateLoginStatus(false);
    loginStatus.textContent = '⚠️ Please connect Spotify first';
    showError('Please connect to Spotify first');
    return;
  }
  
  const playlistId = extractPlaylistId(linkValue);
  if (!playlistId) {
    linkInput.style.borderColor = '#e24b4a';
    linkInput.placeholder = '❌ Invalid playlist URL';
    showError('Invalid playlist URL. Use the format: https://open.spotify.com/playlist/...');
    setTimeout(() => {
      linkInput.style.borderColor = '';
      linkInput.placeholder = 'https://open.spotify.com/playlist/...';
    }, 3000);
    return;
  }
  
  startBtn.disabled = true;
  startBtn.textContent = '⏳ loading playlist…';
  
  try {
    playlistTracks = await fetchPlaylistTracks(playlistId);
  } catch (error) {
    startBtn.disabled = false;
    startBtn.textContent = '🚀 start the game';
    showError(error.message);
    return;
  }
  
  startBtn.disabled = false;
  startBtn.textContent = '🚀 start the game';
  
  if (playlistTracks.length === 0) {
    showError('No tracks found in this playlist');
    return;
  }
  
  const raw = playersInput.value.trim();
  players = raw ? raw.split(',').map(s => s.trim()).filter(Boolean) : ['You'];
  players.forEach(p => scores[p] = 0);
  
  round = 1;
  playerIdx = 0;
  gameOver = false;
  usedIndexes.clear();
  totalRoundsEl.textContent = TOTAL_ROUNDS;
  
  setup.style.display = 'none';
  game.style.display = 'block';
  renderScoreboard();
  newRound();
  
  playBtn.disabled = false;
  guessBtn.disabled = false;
  skipBtn.disabled = false;
  
  showSuccess(`Loaded ${playlistTracks.length} tracks from playlist!`);
};

// ============ GAME CONTROLS ============
playBtn.onclick = () => {
  if (!currentTrack || gameOver) return;
  playClip(clipSeconds);
};

guessBtn.onclick = () => {
  if (!currentTrack || gameOver) return;
  const guessText = guess.value.trim();
  if (!guessText) {
    showError('Please enter a guess');
    return;
  }
  
  const correct = checkGuess(guessText);
  if (correct) {
    const bonus = triesLeft + 1;
    scores[players[playerIdx]] = (scores[players[playerIdx]] || 0) + bonus;
    result.innerHTML = `<span class="result-ok">🎉 Correct! It was "${currentTrack.name}" — ${currentTrack.artist} (+${bonus} points)</span>`;
    renderScoreboard();
    setTimeout(advance, 2000);
    return;
  }
  
  if (triesLeft > 0) {
    triesLeft--;
    clipSeconds++;
    tries.textContent = triesLeft;
    hint.innerHTML = `${clipSeconds} second clip · <span id="tries">${triesLeft}</span> extra listens left`;
    result.innerHTML = '<span class="result-hint">❌ Not quite — try again</span>';
  } else {
    result.innerHTML = `<span class="result-hint">😔 Out of listens! It was "${currentTrack.name}" — ${currentTrack.artist}</span>`;
    setTimeout(advance, 2000);
  }
};

skipBtn.onclick = () => {
  if (!currentTrack || gameOver) return;
  result.innerHTML = `<span class="result-hint">⏭️ Skipped — it was "${currentTrack.name}" — ${currentTrack.artist}</span>`;
  setTimeout(advance, 1500);
};

// ============ INIT ============
console.log('🎵 Blindtest game loaded!');
console.log('📋 Your redirect URI is:', REDIRECT_URI);
console.log('📋 Add this to your Spotify App Dashboard under "Redirect URIs"');
console.log('🔑 Client ID:', CLIENT_ID);
console.log('📌 Required scopes:', SCOPES.join(', '));

// Check token scopes if connected
if (accessToken) {
  checkTokenScopes();
}
</script>
